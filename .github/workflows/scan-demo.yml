name: DocScanSec Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build local DocScanSec image
        run: docker build -t docscansec:local .

      - name: Build a vulnerable test image (for demonstration)
        run: |
          cat <<EOF > Dockerfile.test
          FROM node:14-alpine
          RUN echo "I am a vulnerable app"
          EOF
          docker build -t my-vulnerable-app:latest -f Dockerfile.test .

      - name: Run DocScanSec Scan & Auto-Update Docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # ZMIANA: Używamy 'docscansec:local' zamiast 'ghcr.io/hoaqim/docscansec:main'
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e GITHUB_TOKEN \
            -e GITHUB_REPOSITORY \
            docscansec:local \
            scan my-vulnerable-app:latest --docs-update --auto-fix --severity Critical,High

      - name: Check generated summary
        run: echo "Scan complete! Check your repository for SECURITY_REPORT.md updates."